spring:
  application:
    name: Online-Bookkeeping-Website-Project
  mvc:
    # Required for GlobalExceptionHandler.handleNotFound to fire.
    # By default Spring forwards unmapped URLs to /error (which returns 404 via
    # the Whitelabel page) instead of throwing NoHandlerFoundException, so the
    # @ExceptionHandler would never be reached.
    throw-exception-if-no-handler-found: true
  web:
    resources:
      # Don't map /** to the static resource handler, otherwise the request
      # never reaches DispatcherServlet and NoHandlerFoundException can't be
      # thrown for unknown paths.
      add-mappings: false
  datasource:
    url: jdbc:mysql://localhost:3306/db_bookkeeping?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Jakarta
    username: root
    password: Shizukusan1412
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    serialization:
      write-dates-as-timestamps: false  # LocalDate → "2026-07-16", bukan array [2026,7,16]
  sql:
    init:
      mode: always  # Jalankan src/main/resources/schema.sql saat startup (idempotent)
      continue-on-error: true  # Abaikan error DDL minor (mis. kolom yang sudah ada) agar app tetap boot

server:
  port: 8080

mybatis:
  configuration:
    map-underscore-to-camel-case: true
